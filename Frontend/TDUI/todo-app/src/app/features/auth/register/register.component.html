<div class="auth-container">
    <div class="auth-card">
        <h1>Crear cuenta</h1>
        <p class="subtitle">Empezá a organizar tus tareas en tableros</p>

        <form (ngSubmit)="submit()" novalidate>
            <div class="form-group">
                <label for="displayName">Nombre</label>
                <input id="displayName" type="text" name="displayName" [(ngModel)]="model.displayName"
                    autocomplete="name" maxlength="100" required placeholder="Tu nombre" />
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" [(ngModel)]="model.email" autocomplete="email" required
                    placeholder="tu@email.com" />
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input id="password" type="password" name="password" [(ngModel)]="model.password"
                    autocomplete="new-password" minlength="8" required placeholder="Mínimo 8 caracteres" />
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar contraseña</label>
                <input id="confirmPassword" type="password" name="confirmPassword" [(ngModel)]="confirmPassword"
                    autocomplete="new-password" required placeholder="Repetí la contraseña" />
                @if (confirmPassword && !passwordsMatch) {
                <small class="field-hint error">Las contraseñas no coinciden.</small>
                }
            </div>

            @if (errorMessage()) {
            <div class="error-msg">{{ errorMessage() }}</div>
            }

            @if (isSubmitting()) {
            <app-loading></app-loading>
            } @else {
            <button class="primary-btn" type="submit" [disabled]="!canSubmit">
                Crear cuenta
            </button>
            }
        </form>

        <p class="footer-link">
            ¿Ya tenés cuenta?
            <a routerLink="/login">Iniciá sesión</a>
        </p>
    </div>
</div>
