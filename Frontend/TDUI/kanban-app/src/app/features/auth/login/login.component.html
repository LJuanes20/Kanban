<div class="auth-container">
    <div class="auth-card">
        <h1>Iniciar sesión</h1>
        <form (ngSubmit)="submit()" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" [(ngModel)]="model.email" autocomplete="email" required
                    placeholder="tu@email.com" />
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input id="password" type="password" name="password" [(ngModel)]="model.password"
                    autocomplete="current-password" required placeholder="••••••••" />
            </div>

            @if (errorMessage()) {
            <div class="error-msg">{{ errorMessage() }}</div>
            }

            @if (isSubmitting()) {
            <app-loading></app-loading>
            } @else {
            <button class="primary-btn" type="submit" [disabled]="!canSubmit">
                Iniciar sesión
            </button>
            }
        </form>

        <p class="footer-link">
            ¿No tienes cuenta?
            <a routerLink="/register">Regístrate</a>
        </p>
    </div>
</div>
